<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEND MsAnalyzer</title>
  <link rel="stylesheet" href="https://pyscript.net/releases/2026.6.1/core.css" />
  <script type="module" src="https://pyscript.net/releases/2026.6.1/core.js"></script>
  <script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
  <script src="https://unpkg.com/elkjs@0.9.3/lib/elk.bundled.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

<!-- SVG Filter for liquid glass -->
<svg width="0" height="0" style="position:absolute;">
  <defs>
    <filter id="glass-distortion" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.01 0.01"
        numOctaves="2" seed="92" result="noise"/>
      <feGaussianBlur in="noise" stdDeviation="2" result="blurred"/>
      <feDisplacementMap in="SourceGraphic" in2="blurred" scale="55"
        xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="glass-distortion-sm" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05 0.05"
        numOctaves="2" seed="92" result="noise"/>
      <feGaussianBlur in="noise" stdDeviation="1" result="blurred"/>
      <feDisplacementMap in="SourceGraphic" in2="blurred" scale="8"
        xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<!-- Full-screen SVG canvas (D3 draws here) -->
<svg id="diagram"></svg>

<!-- Preact app mounts here (all panels, modals, search) -->
<div id="app"></div>

<!-- PyScript: Python analysis engine -->
<script type="py" config="./pyscript.toml">
import io, json, sys
import pyodide_http
from pyscript import window
from multi_repo_analyzer import MultiRepoGraphAnalyzer

pyodide_http.patch_all()
analyzer = MultiRepoGraphAnalyzer()

def build_multi_repo_graph(repos_json):
    buf = io.StringIO()
    sys.stdout = buf
    try:
        repos = json.loads(repos_json) if repos_json else []
        result = analyzer.analyze(repos)
        result["log"] = buf.getvalue()
        return json.dumps(result)
    except Exception as e:
        import traceback
        return json.dumps({"error": str(e), "log": buf.getvalue() + "\n" + traceback.format_exc()})
    finally:
        sys.stdout = sys.__stdout__

window.buildMultiRepoGraph = build_multi_repo_graph

def build_graph_csv(nodes_json, edges_json):
    nodes = json.loads(nodes_json) if nodes_json else []
    edges = json.loads(edges_json) if edges_json else []
    return MultiRepoGraphAnalyzer.build_adjacency_csv(nodes, edges)

window.buildGraphCsv = build_graph_csv
</script>

<!-- Preact app (ES module) -->
<script type="module" src="./js/app.js"></script>
</body>
</html>
